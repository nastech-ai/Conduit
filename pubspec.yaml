name: conduit
description: "A mobile terminal workspace for SSH, Mosh, SFTP, and local shells."
publish_to: 'none'
version: 1.4.9+34

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.1"

dependencies:
  flutter:
    sdk: flutter

  connectivity_plus: ^6.1.0
  cbor: ^6.3.7
  crypto: ^3.0.7
  cupertino_icons: ^1.0.8
  dartssh2:
    git:
      url: https://github.com/gwitko/dartssh2_conduit.git
      ref: c39f316a853e6d6a21db698503450a39d9e96d68
  conduit_vt:
    git:
      url: https://github.com/gwitko/conduit_vt.git
      ref: 57222273f969892c6b45b0fcfdbe65a0f54743a9
  dart_mosh: ^0.0.4
  flutter_pty: ^0.4.2
  ffi: ^2.2.0
  http: ^1.2.2
  path: ^1.9.0
  path_provider: ^2.1.4
  flutter_secure_storage: ^10.3.1
  local_auth: ^3.0.1
  pinenacl: ^0.6.0
  uuid: ^4.5.3
  file_picker: ^11.0.2
  fido2: ^1.1.0
  flutter_nfc_kit: ^3.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  adaptive_icon_monochrome: "assets/icon/icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - third_party/licenses/
    - third_party/notices/
  fonts:
    - family: AtkynsonMonoNerdFontMono
      fonts:
        - asset: assets/fonts/AtkynsonMonoNerdFontMono-Regular.otf
