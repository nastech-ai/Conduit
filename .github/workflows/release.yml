name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Test and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version
        id: bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags --quiet

          current="$(sed -n 's/^version:[[:space:]]*//p' pubspec.yaml | head -n 1)"
          name_part="${current%%+*}"
          build_part="${current##*+}"
          major="$(cut -d. -f1 <<<"$name_part")"
          minor="$(cut -d. -f2 <<<"$name_part")"
          patch="$(cut -d. -f3 <<<"$name_part")"

          while :; do
            patch=$((patch + 1))
            build_part=$((build_part + 1))
            new_version="${major}.${minor}.${patch}"
            tag="v${new_version}"
            if ! git rev-parse -q --verify "refs/tags/${tag}" >/dev/null \
               && ! git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              break
            fi
          done

          sed -i "s/^version:.*/version: ${new_version}+${build_part}/" pubspec.yaml

          git add pubspec.yaml
          git commit -m "ci: bump version to ${tag} [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build local shell native binaries
        run: |
          docker_args=(--rm)
          if [[ -n "${ACT:-}" ]]; then
            act_container="$(docker ps --format '{{.ID}} {{.Names}}' | awk '/act-Release-Test-and-release/ { print $1; exit }')"
            if [[ -z "$act_container" ]]; then
              echo "Could not find the running act job container." >&2
              exit 1
            fi
            docker_args+=(--volumes-from "$act_container" -w "$PWD")
          else
            docker_args+=(-v "$PWD:/workspace" -w /workspace)
          fi
          docker run "${docker_args[@]}" debian:trixie \
            bash -lc '
              set -euo pipefail
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends autoconf autogen automake autopoint bison build-essential curl file flex g++ g++-multilib gawk gettext gnupg gperf git intltool jq libfl-dev libglib2.0-dev libltdl-dev libtool-bin lrzip lzip lz4 lzop m4 openjdk-21-jdk-headless patch patchelf pkg-config python-is-python3 python3-pip python3-setuptools python3-venv python-wheel-common rsync scons sudo tar unzip wget xz-utils zip zstd
              git config --global --add safe.directory "$(pwd)"
              git config --global --add safe.directory "$(pwd)/build/local-shell-native/termux-packages"
              CONDUIT_KEEP_LOCAL_SHELL_BUILD_ARTIFACTS=1 TERMUX_JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64 TERMUX_QUIET_BUILD=true tools/build-local-shell-binaries.sh
              chown -R '"$(id -u):$(id -g)"' android/app/src/main/jniLibs build/local-shell-native third_party/source-offer/bundled-binaries.sha256 || true
            '
          android_sdk="$PWD/build/local-shell-native/android-sdk-9123335"
          android_ndk="$PWD/build/local-shell-native/android-ndk-r29"
          test -d "$android_sdk"
          test -d "$android_ndk"
          if [[ -n "${GITHUB_ENV:-}" ]]; then
            {
              echo "ANDROID_HOME=$android_sdk"
              echo "ANDROID_SDK_ROOT=$android_sdk"
              echo "ANDROID_NDK_HOME=$android_ndk"
              echo "ANDROID_NDK_ROOT=$android_ndk"
              echo "NDK=$android_ndk"
            } >> "$GITHUB_ENV"
          fi
          if [[ -n "${GITHUB_PATH:-}" ]]; then
            {
              echo "$android_sdk/platform-tools"
              echo "$android_sdk/cmdline-tools/bin"
            } >> "$GITHUB_PATH"
          fi

      - name: Configure Android signing
        id: signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          if [[ -z "${ANDROID_KEYSTORE_BASE64}" ]]; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 is not set; building unsigned APKs. Add ANDROID_KEYSTORE_BASE64, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD, and ANDROID_STORE_PASSWORD as repository secrets to produce signed, Play Store-ready release APKs."
            echo "signed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          required=(
            ANDROID_KEY_ALIAS
            ANDROID_KEY_PASSWORD
            ANDROID_STORE_PASSWORD
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              echo "::error::${name} must be set when ANDROID_KEYSTORE_BASE64 is set."
              exit 1
            fi
          done

          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/app/upload-keystore.jks
          {
            echo "storeFile=upload-keystore.jks"
            echo "storePassword=${ANDROID_STORE_PASSWORD}"
            echo "keyPassword=${ANDROID_KEY_PASSWORD}"
            echo "keyAlias=${ANDROID_KEY_ALIAS}"
          } > android/key.properties
          echo "signed=true" >> "${GITHUB_OUTPUT}"

      - name: Build Android APKs
        run: flutter build apk --release --flavor full --split-per-abi

      - name: Build release metadata
        id: metadata
        shell: bash
        run: |
          pubspec_version="$(sed -n 's/^version:[[:space:]]*//p' pubspec.yaml | head -n 1)"
          app_version="${pubspec_version%%+*}"
          version_code="${pubspec_version##*+}"
          if [[ -z "${app_version}" || -z "${version_code}" || "${app_version}" == "${version_code}" ]]; then
            echo "::error::pubspec.yaml version must use Flutter's versionName+versionCode format."
            exit 1
          fi
          tag="v${app_version}"
          release_name="Release ${tag}"
          if [[ "${{ steps.signing.outputs.signed }}" != "true" ]]; then
            release_name="${release_name} (unsigned)"
          fi
          {
            echo "tag=${tag}"
            echo "name=${release_name}"
            echo "version=${app_version}"
            echo "version_code=${version_code}"
          } >> "${GITHUB_OUTPUT}"

      - name: Show local release metadata
        if: ${{ env.ACT }}
        run: |
          echo "Local act run; skipping GitHub tag and release creation."
          echo "Tag would be: ${{ steps.metadata.outputs.tag }}"

      - name: Create GitHub release
        if: ${{ !env.ACT }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag }}
          name: ${{ steps.metadata.outputs.name }}
          target_commitish: ${{ github.sha }}
          files: build/app/outputs/flutter-apk/*-release.apk
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
