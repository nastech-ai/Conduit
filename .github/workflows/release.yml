name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Test and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build local shell native binaries
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            debian:trixie \
            bash -lc '
              set -euo pipefail
              apt-get update
              apt-get install -y autoconf autogen automake autopoint bison build-essential curl file flex g++ g++-multilib gawk gettext gnupg gperf git intltool jq libfl-dev libglib2.0-dev libltdl-dev libtool-bin lrzip lzip lz4 lzop m4 patch patchelf pkg-config python-is-python3 python3-pip python3-setuptools python3-venv python-wheel-common rsync scons sudo tar unzip wget xz-utils zip zstd
              git config --global --add safe.directory /workspace
              TERMUX_QUIET_BUILD=true tools/build-local-shell-binaries.sh
              chown -R '"$(id -u):$(id -g)"' android/app/src/main/jniLibs build/local-shell-native third_party/source-offer/bundled-binaries.sha256
            '

      - name: Configure Android signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          if [[ -z "${ANDROID_KEYSTORE_BASE64}" ]]; then
            if [[ -n "${ACT:-}" ]]; then
              echo "ANDROID_KEYSTORE_BASE64 is not set; local act run will build unsigned APKs."
              exit 0
            fi
            echo "::error::ANDROID_KEYSTORE_BASE64 must be set for signed release APKs."
            exit 1
          fi

          required=(
            ANDROID_KEY_ALIAS
            ANDROID_KEY_PASSWORD
            ANDROID_STORE_PASSWORD
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              echo "::error::${name} must be set when ANDROID_KEYSTORE_BASE64 is set."
              exit 1
            fi
          done

          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/app/upload-keystore.jks
          {
            echo "storeFile=upload-keystore.jks"
            echo "storePassword=${ANDROID_STORE_PASSWORD}"
            echo "keyPassword=${ANDROID_KEY_PASSWORD}"
            echo "keyAlias=${ANDROID_KEY_ALIAS}"
          } > android/key.properties

      - name: Build Android APKs
        run: flutter build apk --release --split-per-abi

      - name: Build release metadata
        id: metadata
        shell: bash
        run: |
          pubspec_version="$(sed -n 's/^version:[[:space:]]*//p' pubspec.yaml | head -n 1)"
          app_version="${pubspec_version%%+*}"
          version_code="${pubspec_version##*+}"
          if [[ -z "${app_version}" || -z "${version_code}" || "${app_version}" == "${version_code}" ]]; then
            echo "::error::pubspec.yaml version must use Flutter's versionName+versionCode format."
            exit 1
          fi
          tag="v${app_version}"
          {
            echo "tag=${tag}"
            echo "name=Release ${tag}"
            echo "version=${app_version}"
            echo "version_code=${version_code}"
          } >> "${GITHUB_OUTPUT}"

      - name: Show local release metadata
        if: ${{ env.ACT }}
        run: |
          echo "Local act run; skipping GitHub tag and release creation."
          echo "Tag would be: ${{ steps.metadata.outputs.tag }}"

      - name: Create GitHub release
        if: ${{ !env.ACT }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag }}
          name: ${{ steps.metadata.outputs.name }}
          target_commitish: ${{ github.sha }}
          files: build/app/outputs/flutter-apk/*-release.apk
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
